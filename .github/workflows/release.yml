name: Build and Release Windows Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 提前啟用 Node.js 24 以符合 GitHub 2026 年的新規範
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # Bundling warp.py. Note: video.mp4 might need to be in the same folder as the exe.
          pyinstaller --onefile --windowed --name "tesp1" test_step1.py
          pyinstaller --onefile --windowed --name "tesp2" test_step2.py
          pyinstaller --onefile --windowed --name "tesp3" test_step3.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
